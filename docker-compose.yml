services:
  # Banco de Dados Postgres
  database:
    image: postgres:latest
    container_name: cripto_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=SuaSenha.
      - POSTGRES_DB=criptobank
    ports:
      - "5432:5432"

  # Mensageria RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: cripto_queue
    ports:
      - "5672:5672"   
      - "15672:15672" 
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest